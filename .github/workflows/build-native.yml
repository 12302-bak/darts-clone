name: Build Native Libraries (Multi-Platform)

on:
  # 手动触发（推荐）
  workflow_dispatch:
  # push:
    # branches: [ main ]

# 👇 全局设置默认 shell 为 bash
# GitHub Actions 在 Windows runner 上默认使用 PowerShell 7 执行 run: 命令：
# 在 run: 步骤中强制使用 bash（Windows runner 已预装 Git Bash）：
defaults:
  run:
    shell: bash

jobs:

  # =============== 1. 多平台并行构建 ===============
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, ubuntu-24.04, windows-2025]
        include:
          # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
          - os: macos-15-intel
            artifact-name: libdarts-java.dylib
            build-dir: build
          # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
          - os: ubuntu-24.04
            artifact-name: libdarts-java.so
            build-dir: build
          # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
          - os: windows-2025
            artifact-name: darts-java.dll
            build-dir: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir -p ${{ matrix.build-dir }}

      - name: Configure CMake
        working-directory: ${{ matrix.build-dir }}
        run: cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build darts-java
        working-directory: ${{ matrix.build-dir }}
        # run: cmake --build ./ --config Release --target darts-java -j $(sysctl -n hw.ncpu)
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake --build . --config Release --target darts-java --parallel
          else
            cmake --build . --target darts-java --parallel
          fi

      - name: Upload platform-specific artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ runner.os }}-${{ runner.arch }}
          path: ${{ matrix.build-dir }}/${{ matrix.artifact-name }}
          retention-days: 1

  # =============== 2. 合并所有平台产物 ===============
  merge-and-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-libs

      - name: Inspect downloaded files
        run: |
          ls -R native-libs/

      - name: Reorganize into standard structure
        run: |
          mkdir -p final-native/{Linux/amd64,Mac.x86_64,Windows/amd64}

          # macOS
          mv native-libs/native-macOS-*/*.dylib final-native/Mac.x86_64/libdarts-java.dylib

          # Linux
          mv native-libs/native-Linux-*/*.so final-native/Linux/amd64/libdarts-java.so

          # Windows
          mv native-libs/native-Windows-*/*.dll final-native/Windows/amd64/darts-java.dll

      - name: Create unified zip
        run: |
          cd final-native
          zip -r ../darts-java-native-all.zip .

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: darts-java-native-all
          path: darts-java-native-all.zip
          retention-days: 30